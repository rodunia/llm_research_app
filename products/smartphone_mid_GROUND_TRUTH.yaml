# ============================================================================
# NUMERICAL CONSTRAINTS (For rule-based checking)
# ============================================================================

numerical_constraints:
  display_size_inches: [6.3]
  main_camera_mp: [50]
  ultra_wide_camera_mp: [12]
  front_camera_mp: [10.8]
  storage_gb: [128, 256, 512]
  ram_gb: [8, 12]
  battery_mah_min: 4700
  battery_mah_max: 5000
  fast_charging_w_min: 30
  fast_charging_w_max: 45
  os_update_years: 7
  security_update_years: 7

# ============================================================================
# MANDATORY ELEMENTS (Should be present in marketing)
# ============================================================================

required_disclaimers:
  - "Actual battery life and performance may vary over the 7-year support period"
  - "Not all new software features released during the 7 years will be supported by older hardware"
  - "Device utilizes a multi-layer security approach, but no system is impenetrable"
  - "Some advanced AI features may require a stable internet connection"
  - "Network availability depends on carrier and coverage"
  - "Battery capacity will degrade over time with normal Li-ion aging"
  - "Performance may decline with app complexity and OS evolution over time"

# ============================================================================
# NOTES FOR NLI VERIFICATION
# ============================================================================

# How to use this ground truth:
#
# 1. FACTUAL SPECS - Check CONTRADICTION:
#    - If extracted claim CONTRADICTS factual spec → VIOLATION
#    - Example: "6.5 inch display" contradicts "Display is 6.3 inches" → VIOLATION
#
# 2. PROHIBITED STATEMENTS - Check ENTAILMENT:
#    - If extracted claim MATCHES prohibited statement → VIOLATION
#    - Example: "100% unbreachable" matches prohibited claim → VIOLATION
#
# 3. NUMERICAL CONSTRAINTS - Rule-based check:
#    - Extract numbers from claims, compare to constraints
#    - Example: "16 GB RAM" not in [8, 12] → VIOLATION
#
# 4. REQUIRED DISCLAIMERS - Presence check:
#    - Check if marketing material contains these statements
#    - Missing disclaimers = potential compliance risk
