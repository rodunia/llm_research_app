product_id: cryptocurrency_corecoin
name: CoreCoin (CORE)
risk_level: High (Financial/Investment)
category_focus: Finance/Investment - Digital Asset
region: Global (jurisdiction-dependent)
target_audience: Experienced investors aged 30-65 with high risk tolerance. Individuals
  seeking diversification into digital assets. Users comfortable with self-custody
  and blockchain transactions.
tone: Cautious, Informative, and Professional - No hype, speculation, or promotional
  exaggeration.
specs:
  fundamentals:
  - CoreCoin is a decentralized Layer-1 digital asset
  - Operates on a Proof-of-Stake (PoS) blockchain
  - Provides peer-to-peer value transfer without intermediaries
  - Supports smart contracts and decentralized application integration
  - Decentralized digital asset (operates independently of government/bank control)
  - Digital-only asset requiring compatible wallet software
  - Exists only in digital form (not a physical coin, certificate, or bearer instrument)
  market_characteristics:
  - Market value is highly volatile and influenced by liquidity, market sentiment,
    and macroeconomic conditions
  - Liquidity varies by exchange and market conditions
  - Price discovery occurs through decentralized market mechanisms
  technical_architecture:
    consensus: Proof-of-Stake (PoS)
    average_block_time: ~5 seconds (varies with network load)
    maximum_supply: 2,000,000,000 CORE
    finality_target: ~2 blocks (~10 seconds) under normal conditions
    smart_contract_support: Yes (PoS-compatible VM)
    chain_governance: Community-driven on-chain governance
    cryptography:
    - Cryptographic signatures for transaction validation
    - 'Signature scheme: ECDSA or Ed25519'
    - 'Hashing algorithm: SHA-3 or equivalent'
    interoperability: Not natively cross-chain compatible unless explicitly specified
  network_features:
  - Transactions recorded on a public, tamper-resistant ledger
  - Users retain control of their private keys and funds
  - On-chain activity permanently recorded and viewable through public block explorers
  - Node count, validator distribution, and geographic decentralization may vary over
    time
  - Software clients are open-source and maintained by independent contributors
  - Network relies on distributed validator participation
  - Network uptime depends on distributed validator set
  staking_details:
  - Staking requires locking tokens for defined protocol periods (variable by governance)
  - 'Minimum stake: Protocol-defined threshold'
  - 'Lockup period: Variable (governance-defined)'
  - Staking rewards are variable and depend on network conditions (NOT guaranteed or fixed-rate)
  - Staking allows users to support network security
  - Rewards depend on network participation and validator performance
  fee_structure:
  - 'Fee model: Base fee + variable priority fee (market-driven)'
  - Gas fees fluctuate based on block space demand
  - Transaction fees paid in CORE
  - Network performance (latency, throughput, gas fees) varies with network congestion
  - DApp interactions require on-chain gas fees
  custody_requirements:
  - Can be stored on hardware wallets, mobile wallets, or desktop clients (compatibility
    varies)
  - Private keys cannot be recovered if lost; custody responsibility lies with the
    user
  - Users must securely store private keys
  - Self-custody model with no third-party key recovery
  governance:
  - Protocol updates require community or validator approval
  - On-chain governance votes publicly recorded
  - Open-source governance enables community oversight
  - Governance participation depends on wallet integration and token ownership
  developer_ecosystem:
  - Open-source codebase available for public review
  - SDK available (language support varies)
  - Public and private RPC nodes available
  - Documentation version-controlled and publicly maintained
security_quality:
  audits:
  - Subject to independent third-party security audits (e.g., CertiK)
  - Client software undergoes peer review and continuous patching
  - Security audits assess consensus stability and smart contract risk
  - No guarantee of complete security; vulnerabilities may exist
  transparency:
  - Public ledger provides transparent transaction history
  - On-chain activity viewable through block explorers
  - Open-source codebase enables public review
  - Validators and full nodes operate independently (not centrally operated)
  node_requirements:
    hardware: Commodity hardware (exact specs depend on software client)
    software: Open-source node client
mandatory_statements:
- Cryptocurrency investments involve risk and are highly volatile.
- Do not invest funds you cannot afford to lose.
- CoreCoin is not backed by the FDIC or any government entity.
- Past performance is not indicative of future results.
- Loss of private keys leads to permanent loss of funds.
- Digital assets may be vulnerable to hacking or protocol exploits.
- Market conditions can change rapidly and unpredictably.
- Regulatory changes may affect accessibility or legality.
risk_disclosure: Cryptocurrency investments involve high risk and volatility. Values
  can fluctuate widely and may result in loss of principal. Network performance and
  fees vary with demand and network conditions. Users are responsible for compliance
  with local laws and regulations; availability may vary by jurisdiction.
terminology_guidance: Avoid terms such as 'currency,' 'security,' 'deposit,' unless
  legally accurate. Marketing must not imply universal regulatory approval.
regulatory_classification:
  status:
  - Classification varies by jurisdiction (commodity/digital asset/virtual asset)
  - Not legal tender
  - Not FDIC-insured
  - Not a bank account, deposit, or insured investment account
  - Not SIPC-insured
  - May be subject to securities/commodities regulations depending on location
  compliance:
  - Users are responsible for compliance with local laws and regulations
  - Availability may vary by jurisdiction
  - Not universally approved by regulatory authorities
