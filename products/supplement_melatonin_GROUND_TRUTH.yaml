# Ground Truth for NLI Verification
# Optimized for factual contradiction checking (NOT for LLM generation)
# Use supplement_melatonin.yaml for LLM generation

product_id: supplement_melatonin
name: Melatonin Tablets 3 mg (Immediate-Release)

# ============================================================================
# FACTUAL SPECIFICATIONS (Check for CONTRADICTION)
# These are HARD FACTS that marketing claims should NOT contradict
# ============================================================================

factual_specs:

  # Dosage facts
  dosage:
    - "Each tablet contains 3 mg of melatonin"
    - "Each tablet contains 3 mg of immediate-release melatonin"
    - "The product does NOT contain 1 mg of melatonin"
    - "The product does NOT contain 5 mg of melatonin"
    - "The product does NOT contain 10 mg of melatonin"
    - "Adults take 1 tablet before bedtime"
    - "The product is for occasional short-term use"
    - "The product is for adults 18 years and older"

  # Formulation facts (positive)
  formulation_positive:
    - "The product is vegan"
    - "The product is non-GMO"
    - "The product is free from gluten"
    - "The product is free from soy"
    - "The product is free from dairy"
    - "The product contains no artificial colors"
    - "The product contains no artificial flavors"
    - "The product contains no preservatives"
    - "The product contains no added sugars"
    - "The product contains no sweeteners"
    - "The product contains no gelatin"

  # Formulation facts (negative - what it does NOT have)
  formulation_negative:
    - "The product does NOT contain herbal extracts"
    - "The product does NOT contain proprietary blends"
    - "The product is NOT extended-release"
    - "The product is NOT sustained-release"
    - "The product is NOT fast-dissolve"
    - "The product is NOT gummies"
    - "The product is NOT chewables"
    - "The product is NOT sublingual format"

  # Physical form
  physical_form:
    - "The product is a solid oral tablet"
    - "The product is immediate-release"
    - "The tablets are round"
    - "The tablets are white"
    - "The tablets are uncoated"
    - "The tablets are approximately 6-8 mm in diameter"

  # Packaging
  packaging:
    - "Each bottle contains 120 tablets"
    - "The bottle does NOT contain 60 tablets"
    - "The bottle does NOT contain 90 tablets"
    - "The bottle does NOT contain 180 tablets"
    - "The bottle has a child-resistant cap"
    - "The product is made in the United States"

  # Storage requirements
  storage:
    - "Store at room temperature between 15-30°C"
    - "Store at room temperature between 59-86°F"
    - "Do NOT store at 0°C or below"
    - "Do NOT freeze the product"
    - "Do NOT store above 30°C"
    - "Do NOT store in direct sunlight"
    - "Store in a cool, dry place"

  # Quality/Manufacturing
  quality:
    - "The product is manufactured in a cGMP-compliant facility"
    - "The product is third-party tested"
    - "The product contains 3 mg melatonin per serving"
    - "The product is tested for heavy metals"
    - "The product meets USP specifications"

# ============================================================================
# PROHIBITED STATEMENTS (Check for ENTAILMENT)
# These are explicit statements marketing should NOT make
# Written as actual claims (not meta-descriptions)
# If extracted claim MATCHES these, it's a violation
# ============================================================================

prohibited_statements:

  # Disease treatment claims
  disease_claims:
    - "This product treats insomnia"
    - "This product cures insomnia"
    - "This product prevents insomnia"
    - "This product treats chronic insomnia"
    - "This product treats sleep apnea"
    - "This product treats restless leg syndrome"
    - "This product treats anxiety"
    - "This product treats depression"
    - "This product treats ADHD"
    - "This product treats jet lag"
    - "This product treats shift-work disorder"
    - "This product diagnoses any disease"
    - "This product prevents any disease"

  # Absolute guarantees
  absolute_guarantees:
    - "Guaranteed to help you fall asleep"
    - "Guaranteed to work"
    - "You will fall asleep in 10 minutes"
    - "You will fall asleep in 15 minutes"
    - "You will fall asleep in 30 minutes"
    - "This product always works"
    - "This product never fails"
    - "This product is 100% effective"
    - "Eliminates sleeplessness"
    - "Eliminates insomnia"
    - "You will sleep through the night"
    - "Eliminates night awakenings"
    - "Zero side effects"
    - "Risk-free"
    - "Side-effect free"
    - "Guaranteed next-day alertness"
    - "Guaranteed performance improvement"
    - "Guaranteed productivity boost"

  # Physiological overreach
  physiological_claims:
    - "Regulates hormones"
    - "Balances hormones"
    - "Normalizes hormones"
    - "Permanently increases melatonin production"
    - "Modifies REM sleep"
    - "Modifies deep-sleep architecture"
    - "Increases REM sleep stages"
    - "Increases deep sleep stages"
    - "Permanently resets circadian rhythm"
    - "Permanently alters sleep cycles"
    - "Increases total sleep duration"
    - "Guarantees specific sleep stages"

  # Performance/cognition claims
  performance_claims:
    - "Improves mood"
    - "Reduces stress disorders"
    - "Enhances memory"
    - "Enhances focus"
    - "Enhances intelligence"
    - "Enhances productivity"
    - "Improves cognitive function"
    - "Treats chronic stress"
    - "Treats mood disorders"

  # Regulatory violations
  regulatory_violations:
    - "FDA-approved"
    - "FDA-approved as a drug"
    - "FDA-evaluated for drug efficacy"
    - "Clinically proven to treat insomnia"
    - "Clinically proven to cure sleep disorders"
    - "Doctor-prescribed"
    - "Prescription-strength"
    - "Medical-grade"
    - "Pharmaceutical-grade sleep aid"
    - "Number 1 doctor choice"
    - "Best sleep supplement"
    - "Endorsed by medical institutions"

  # Population safety violations
  population_safety:
    - "Safe for children"
    - "Safe for adolescents"
    - "Safe for pregnant individuals"
    - "Safe for breastfeeding individuals"
    - "Recommended for pregnant individuals"
    - "Safe for all adults universally"
    - "Safe for everyone"

  # Dosage violations
  dosage_violations:
    - "Take continuously without breaks"
    - "Use daily for months"
    - "Use daily for years"
    - "Adjust dosing frequency without limit"
    - "Take as often as needed"
    - "Take every 2 hours"
    - "Take multiple times per day"

  # Storage violations
  storage_violations:
    - "Store above 30°C"
    - "Store in direct sunlight"
    - "No storage requirements"
    - "Can be stored anywhere"
    - "Store at 0°C"
    - "Store below freezing"

  # Side effect misrepresentations
  side_effect_violations:
    - "Side effects are irreversible"
    - "Side effects are long-lasting"
    - "Side effects are permanent"
    - "Causes permanent dependency"
    - "Causes permanent tolerance"
    - "Addictive"
    - "Forms permanent habits"

# ============================================================================
# NUMERICAL CONSTRAINTS (For rule-based checking)
# ============================================================================

numerical_constraints:
  dosage_mg: [3]  # ONLY 3 mg allowed
  tablets_per_bottle: [120]  # ONLY 120 allowed
  storage_temp_min_celsius: 15
  storage_temp_max_celsius: 30
  storage_temp_min_fahrenheit: 59
  storage_temp_max_fahrenheit: 86
  age_minimum: 18

# ============================================================================
# MANDATORY ELEMENTS (Must be present)
# Marketing materials SHOULD include these
# ============================================================================

required_disclaimers:
  - "These statements have not been evaluated by the Food and Drug Administration"
  - "This product is not intended to diagnose, treat, cure, or prevent any disease"
  - "Consult a physician before use if you have a medical condition"
  - "Keep out of reach of children"
  - "This product is a dietary supplement, not a drug"

# ============================================================================
# NOTES FOR NLI VERIFICATION
# ============================================================================

# How to use this ground truth:
#
# 1. FACTUAL SPECS - Check CONTRADICTION:
#    - If extracted claim CONTRADICTS factual spec → VIOLATION
#    - Example: "Contains 5 mg" contradicts "Contains 3 mg" → VIOLATION
#
# 2. PROHIBITED STATEMENTS - Check ENTAILMENT:
#    - If extracted claim MATCHES prohibited statement → VIOLATION
#    - Example: "Treats insomnia" matches "This product treats insomnia" → VIOLATION
#
# 3. NUMERICAL CONSTRAINTS - Rule-based check:
#    - Extract numbers from claims, compare to constraints
#    - Example: "16 GB RAM" not in [3] → VIOLATION
#
# 4. REQUIRED DISCLAIMERS - Presence check:
#    - Check if marketing material contains these statements
#    - Missing disclaimers = potential compliance risk
