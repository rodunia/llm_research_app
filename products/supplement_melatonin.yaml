product_id: supplement_melatonin
name: Melatonin Tablets 3 mg (Immediate-Release)
risk_level: Low (Dietary Supplement)
category_focus: Health/Wellness - Sleep Support
region: US
target_audience: Adults aged 25-55 experiencing occasional sleeplessness due to stress
  or schedule changes. Individuals seeking a non-habit-forming, vegan sleep-support
  supplement.
tone: Scientific, Trustworthy, and Calming - No hype, no absolutes, no medical framing.
specs:
  dosage:
  - Each tablet contains 3 mg melatonin (immediate-release)
  - 'Recommended use: adults take 1 tablet 30–60 minutes before bedtime'
  - For occasional short-term use only
  - 'Age recommendation: adults 18+'
  formulation:
  - Vegan, Non-GMO, and free from gluten, soy, and dairy
  - Contains no artificial colors, flavors, or preservatives
  - No added sugars, sweeteners, or gelatin
  - No herbal extracts or proprietary blends
  - Pure melatonin formulation with minimal inactive ingredients
  quality:
