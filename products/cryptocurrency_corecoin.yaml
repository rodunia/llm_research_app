prohibited_or_unsupported_claims:
  investment_guarantees:
  - Guaranteed profit, yields, interest, or returns
  - Claims of 'risk-free,' 'stable,' or 'guaranteed growth'
  - Predicting future price increases or performance
  - Fixed or guaranteed staking returns/yields
  - Claims of inevitable adoption or value appreciation
  regulatory_authority:
  - Claims of SEC, MiCA, FCA, or central-bank approval
  - Implying FDIC, SIPC, or government insurance
  hype_urgency:
  - Don't miss out, moonshot, limited-time opportunity
  - FOMO-inducing language or artificial scarcity claims
  - Claims promoting urgency (e.g., 'limited-time bonus')
  - Pump, moon, or other speculative terminology
  comparisons_analogies:
  - Comparing to stocks, bonds, bank accounts, or insurance products
  - Equating to regulated financial products without disclaimers
  - Claims that it functions as traditional currency
  technical_hallucinations:
  - Zero-gas transactions or fixed-fee claims
  - Quantum resistance or unbreakable security claims
  - Features not implemented (e.g., sharding, cross-chain bridges, instantaneous finality)
  - Claims of hack-proof or 100% secure status
  - Private key recovery by developers or foundation
  - Censorship-proof, seizure-proof, or tax-exempt claims
  - Automatic key recovery, backup, or sharding mechanisms
  - Self-custody with third-party recovery options
  - Passwordless account access or biometric-only security without private keys
  market_operations:
  - Regional or geographic trading restrictions or pauses
  - Market circuit breakers or trading halts
  - Trading hours, time-zone limitations, or maintenance windows affecting trading
  - Centralized market-making or liquidity guarantees
  - Manual intervention in trading or settlement processes
  - Claims of controlled volatility or price stability mechanisms
  - Scheduled downtime or regional service interruptions
  governance_violations:
  - Governance proposals auto-approve or auto-pass without voting
  - No quorum requirements for protocol changes
  - Centralized veto power or admin keys (unless explicitly disclosed in specs)
  - Automatic execution of proposals without community vote
  - Governance votes that bypass validator or stakeholder approval
  - Token-weighted voting without minimum stake requirements
  - Protocol changes without on-chain governance process
  economic_geopolitical:
  - Hedge against inflation, recession, or geopolitical instability
  - Replacement for fiat currency
  - Protection from government monetary policy
  - Safe haven asset claims
  endorsement_authority:
  - Claims of investment by major institutions or celebrities without verification
  - Implied endorsement by regulators, governments, or financial institutions
  - Claims of being 'recommended by experts' without substantiation
clarifications:
  - Blockchain transparency does not protect against losses or fraud
  - Decentralization does not imply regulatory immunity
  - Public ledger does not guarantee anonymity
  - Transactions may be traceable depending on analysis tools
  - Smart contract code may contain vulnerabilities
  - On-chain transactions are recorded on public blockchain (verifiable but not editing history)
  - Staking rewards are variable and NOT guaranteed or fixed-rate
  - Network performance depends on validator participation
  - Transaction settlement depends on network health
  - Gas fees are variable and market-driven
  - Network uptime not guaranteed
  - Users are solely responsible for private key security
  - Lost private keys cannot be recovered
  - No customer support for lost keys or failed transactions
  - Self-custody requires technical knowledge and security practices
  - Does NOT support non-staking light validators
  - Smart contract execution requires gas fees (NOT gas-free or zero-fee)
  - Governance proposals require quorum thresholds (NOT auto-pass without approval)
  - NOT natively cross-chain compatible (RPC does NOT simulate cross-chain calls)
  - Unstaking does NOT reduce or affect historical reward calculations
  - Validator inactivity does NOT lock governance voting rights
  - Staking rewards are NOT region-based and NOT fixed-rate tiers
