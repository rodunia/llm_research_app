prohibited_or_unsupported_claims:
  disease_treatment:
  - Any claim that the product diagnoses, treats, cures, or prevents a disease
  - Claims about insomnia, chronic insomnia, sleep apnea, restless leg syndrome
  - Claims about anxiety, depression, ADHD, or any mental health conditions
  - Claims that it treats jet lag or shift-work disorder
  guarantees_absolutes:
  - Guarantees about sleep onset time (e.g., 'fall asleep in 10 minutes')
  - Claims of 'zero side effects', 'risk-free', or 'side-effect free'
  - Guarantees of next-day alertness, performance, productivity, or cognitive benefits
  - Claims about 'sleeping through the night' or 'eliminating night awakenings'
  regulatory_authority:
  - Claims such as 'clinically proven' or 'doctor recommended' without product-specific
    evidence
  - Claims implying endorsement by medical institutions or sleep clinics
  - Claims of being '#1 doctor choice' or 'best sleep supplement' without substantiation
  population_safety:
  - Claims that it is safe for children, adolescents, pregnant or breastfeeding individuals
  - Claims that it is safe or recommended for all adults universally
  physiological_overreach:
  - Claims that it regulates, balances, or normalizes hormones
  - Claims that it permanently increases endogenous melatonin production
  - Claims about modifying REM or deep-sleep architecture
  - Claims about permanently resetting circadian rhythm
  - Claims about increasing total sleep duration or specific sleep stages
  performance_cognition:
  - Claims that it improves mood, reduces stress disorders, or treats anxiety
  - Claims about enhancing memory, focus, intelligence, or productivity
  - Claims relating to treating chronic stress or mood disorders
  dosage_safety:
  - Claims about continuous use without breaks
  - Claims that dosing frequency can be self-adjusted without limit
  storage_handling:
  - Claims to store above 30°C or in direct sunlight
  - Claims that product does not require specific storage conditions
  age_restrictions:
  - Claims that the product is unsafe for healthy adults
  - Claims of inverted age restrictions (e.g., "not for adults")
  side_effects:
  - Claims that side effects are irreversible or long-lasting
  - Claims of permanent dependency or tolerance
clarifications:
- Melatonin is not a sedative drug - it works with natural sleep rhythms
- Melatonin does not treat chronic insomnia or medical sleep disorders
- Melatonin does not induce sleep like prescription sleeping pills
- This product is NOT FDA-approved as a drug
- This product is NOT evaluated by the FDA for safety or efficacy as a drug
- Melatonin supplements do NOT have FDA approval for medical use
- This product does NOT work for 100% of users
- Individual results may vary - not all adults will respond the same way
- Melatonin does not guarantee immediate or universal sleep onset
- Melatonin does not modify REM/deep-sleep architecture
- Melatonin does not permanently reset circadian rhythm
- Intended for adults 18 years and older
- Suitable for healthy adults (do NOT avoid if you are an adult over 18)
- Drowsiness is temporary and intended (not permanent or long-lasting)
- Side effects typically resolve after sleep period ends
usage_instructions:
- Take 1 tablet 30–60 minutes before bedtime
- Take ONCE per 24 hours only (do NOT take more frequently)
- Do NOT take every 2 hours or at frequent intervals
- For occasional short-term use only
- Do not exceed the recommended dose
- Intended for nighttime use only
- Not intended as long-term nightly therapy without medical supervision
safety_warnings:
- May cause drowsiness; do not drive or operate machinery after consumption
- Keep out of reach of children
- Not recommended for pregnant or breastfeeding individuals
- Consult a physician before use if you have a medical condition or are taking medications
- Discontinue use if adverse reactions occur
