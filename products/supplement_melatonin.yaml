  - Third-party tested for identity, purity, and potency
  - Verified to contain 3 mg melatonin per serving
  - Tested for heavy metals (lead, arsenic, cadmium, mercury)
  - Meets USP specifications for purity, potency, and microbial limits
  - Batch-level COA available upon request
  - Verified free from common contaminants (pesticides, residual solvents)
  physical_characteristics:
  - Solid oral tablet (immediate-release only)
  - Small, round, uncoated white tablets (~6–8 mm diameter)
  - Not extended-release, sustained-release, or fast-dissolve
  - Available in tablet form only (not gummies, chewables, or sublingual formats)
  packaging:
  - 120 tablets per bottle
  - Safety-sealed HDPE bottle with child-resistant cap
  - Lot number and expiry date printed for traceability
  - 'Shelf life: 24–36 months from production date'
  - Store at room temperature (15-30°C / 59-86°F)
  - Do NOT store at 0°C or below (do not freeze)
  - Store in a cool, dry place away from heat and light
  - Made in the United States
